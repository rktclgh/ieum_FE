name: Notify backend after frontend main update

on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: notify-app-main-main
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify backend
        env:
          # fine-grained PAT with Contents read/write on rktclgh/ieum_BE
          CI_GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
        run: |
          if [[ -z "$CI_GITHUB_TOKEN" ]]; then
            echo "CI_GITHUB_TOKEN is required" >&2
            exit 1
          fi

          frontend_sha="$GITHUB_SHA"
          if [[ ! "$frontend_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "GITHUB_SHA must be a 40-character lowercase Git commit SHA" >&2
            exit 1
          fi
          printf -v payload '{"event_type":"frontend-updated","client_payload":{"frontend_sha":"%s"}}' "$frontend_sha"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --url https://api.github.com/repos/rktclgh/ieum_BE/dispatches \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $CI_GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload"
